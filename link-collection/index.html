<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="pageTitle">Hundred Plus — Links</title>
    <style>
      :root {
        --bg-top: #3a3a3a;
        --bg-bottom: #1a1a1a;
        --card-border: rgba(255, 255, 255, 0.35);
        --card-bg: rgba(255, 255, 255, 0.03);
        --text-main: #ffffff;
        --text-sub: #d8d8d8;
        --accent-red: #b3282d;
        --accent-green: #1e6b3c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(
          circle at 50% 0%,
          var(--bg-top),
          var(--bg-bottom) 75%
        );
        color: var(--text-main);
        display: flex;
        justify-content: center;
      }

      .page {
        width: 100%;
        max-width: 560px;
        padding: 32px 20px 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .top-bar {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        text-decoration: none;
      }

      .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
      }

      .avatar svg {
        width: 62px;
        height: 62px;
      }

      h1 {
        font-size: 26px;
        font-weight: 800;
        margin: 0 0 6px;
        text-align: center;
        letter-spacing: 0.2px;
      }

      .tagline {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-sub);
        text-align: center;
        margin: 0 0 28px;
        letter-spacing: 0.3px;
      }

      .link-list {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .link-card {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid var(--card-border);
        border-radius: 14px;
        background: var(--card-bg);
        text-decoration: none;
        color: var(--text-main);
        transition:
          transform 0.15s ease,
          background 0.15s ease,
          border-color 0.15s ease;
        overflow: hidden;
      }

      .link-card:hover,
      .link-card:focus-visible {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.6);
        outline: none;
      }

      .link-card:active {
        transform: translateY(0);
      }

      .link-icon {
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 14px;
        background: #fff;
        overflow: hidden;
      }
      /* 
      .link-icon svg,
      .link-icon img {
        width: 20px;
      } */

      .link-label {
        flex: 1 1 auto;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
        padding-right: 20px;
      }

      .link-more {
        flex: 0 0 auto;
        font-size: 18px;
        color: var(--text-sub);
        line-height: 1;
      }

      /* subtle gradient tints per row, echoing the screenshot */
      .tint-red::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(179, 40, 45, 0.25),
          transparent 60%
        );
        z-index: 0;
        pointer-events: none;
      }
      .tint-green::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(30, 107, 60, 0.25),
          transparent 60%
        );
        z-index: 0;
        pointer-events: none;
      }
      .link-icon,
      .link-label,
      .link-more {
        position: relative;
        z-index: 1;
      }

      @media (max-width: 400px) {
        h1 {
          font-size: 22px;
        }
        .avatar {
          width: 92px;
          height: 92px;
        }
        .link-label {
          font-size: 13.5px;
        }
      }

      /* Language dropdown */
      .lang-switcher {
        position: relative;
      }

      .lang-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        width: auto;
        height: 40px;
        padding: 0 14px 0 10px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      .lang-btn svg {
        flex: 0 0 auto;
      }

      .lang-btn .chevron {
        width: 14px;
        height: 14px;
        transition: transform 0.15s ease;
      }

      .lang-switcher.open .lang-btn .chevron {
        transform: rotate(180deg);
      }

      .lang-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        min-width: 130px;
        background: #232323;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 6px;
        list-style: none;
        margin: 0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition:
          opacity 0.15s ease,
          transform 0.15s ease;
        z-index: 10;
      }

      .lang-switcher.open .lang-menu {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .lang-option {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 9px 10px;
        border: none;
        background: transparent;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
      }

      .lang-option:hover,
      .lang-option:focus-visible {
        background: rgba(255, 255, 255, 0.1);
        outline: none;
      }

      .lang-option[aria-selected="true"] {
        color: #90caff;
      }

      .lang-option .check {
        width: 14px;
        height: 14px;
        opacity: 0;
      }

      .lang-option[aria-selected="true"] .check {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top-bar">
        <p></p>
        <div class="lang-switcher" id="langSwitcher">
          <button
            class="lang-btn"
            id="langBtn"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-label="Select language"
            data-i18n-attr="aria-label:selectLanguage"
          >
            <svg
              width="20px"
              height="20px"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418"
              />
            </svg>
            <span id="langBtnLabel">EN</span>
            <svg
              class="chevron"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m6 9 6 6 6-6"
              />
            </svg>
          </button>
          <ul
            class="lang-menu"
            id="langMenu"
            role="listbox"
            aria-label="Language"
            data-i18n-attr="aria-label:language"
          >
            <li>
              <button
                class="lang-option"
                role="option"
                data-lang="en"
                aria-selected="true"
              >
                <span>English</span>
                <svg
                  class="check"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4.5 12.75l6 6 9-13.5"
                  />
                </svg>
              </button>
            </li>
            <li>
              <button
                class="lang-option"
                role="option"
                data-lang="tw"
                aria-selected="false"
              >
                <span>繁體中文</span>
                <svg
                  class="check"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4.5 12.75l6 6 9-13.5"
                  />
                </svg>
              </button>
            </li>
            <li>
              <button
                class="lang-option"
                role="option"
                data-lang="th"
                aria-selected="false"
              >
                <span>ภาษาไทย</span>
                <svg
                  class="check"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4.5 12.75l6 6 9-13.5"
                  />
                </svg>
              </button>
            </li>
          </ul>
        </div>
      </div>

      <div class="avatar">
        <img width="70px" src="hundredplus.webp" />
      </div>

      <h1 data-i18n="heading">Hundred Plus</h1>
      <p class="tagline" data-i18n="tagline">We do Hundred Plus Services</p>

      <div class="link-list">
        <a
          class="link-card"
          href="https://www.hundredplus.com/portal/en/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="link-icon">
            <img width="28px" src="hundredplus.webp" />
          </span>
          <span class="link-label" data-i18n="linkHundredPlus"
            >Hundred Plus Website</span
          >
        </a>
        <a
          class="link-card"
          href="https://www.101form.net/en/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="link-icon">
            <img width="22px" src="form.webp" />
          </span>
          <span class="link-label" data-i18n="link101Form"
            >101Form Website</span
          >
        </a>
        <a
          class="link-card tint-red"
          href="https://www.xninja.biz/en/home"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="link-icon white-icon">
            <img width="20px" src="xNinja.webp" />
          </span>
          <span class="link-label" data-i18n="linkXninja"
            >xNinja AI Workhub — Hundred Plus</span
          >
        </a>

        <a
          class="link-card"
          href="https://www.facebook.com/101SaaS"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="link-icon" style="background: #1877f2">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path

                d="M13.5 21v-7.5h2.5l.4-3H13.5V8.4c0-.87.24-1.46 1.5-1.46h1.6V4.35C16.3 4.24 15.4 4.1 14.3 4.1c-2.3 0-3.8 1.4-3.8 4v2.4H8v3h2.5V21h3z"
              />
            </svg>
          </span>
          <span class="link-label" data-i18n="linkFacebook">Facebook</span>
        </a>

        <a
          class="link-card"
          href="https://www.linkedin.com/company/hundred-plus-tw?originalSubdomain=tw"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="link-icon" style="background: #0a66c2">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                fill="#fff"
                d="M6.94 8.5H4.06V19h2.88V8.5zM5.5 4.75a1.67 1.67 0 100 3.34 1.67 1.67 0 000-3.34zM20 12.7c0-3.15-1.68-4.62-3.92-4.62-1.81 0-2.62 1-3.08 1.7V8.5H10.1c.04.85 0 10.5 0 10.5H13v-5.86c0-.31.02-.63.11-.85.25-.63.82-1.28 1.77-1.28 1.25 0 1.75.95 1.75 2.34V19H20v-6.3z"
              />

        <a
          class="link-card"

          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="link-icon" style="background: #ff0000">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                fill="#fff"
                d="M21.6 7.2s-.21-1.5-.87-2.16c-.83-.87-1.76-.87-2.19-.92C15.5 4 12 4 12 4h-.01s-3.5 0-6.54.12c-.43.05-1.36.05-2.19.92C2.6 5.7 2.4 7.2 2.4 7.2S2.2 8.95 2.2 10.7v1.6c0 1.75.2 3.5.2 3.5s.2 1.5.86 2.16c.83.87 1.92.84 2.4.93C7.4 20.02 12 20.06 12 20.06s3.5-.01 6.54-.12c.43-.05 1.36-.05 2.19-.93.66-.66.87-2.16.87-2.16s.2-1.75.2-3.5v-1.6c0-1.75-.2-3.5-.2-3.5zM9.9 14.6V8.9l5.4 2.85-5.4 2.85z"
              />

          </span>
          <span class="link-label" data-i18n="linkYoutube">Hundred Plus</span>

        <a
          class="link-card tint-green"
          href="https://www.tiktok.com/@hundredplus.th?_r=1&_t=zs-98bpxs9ti7r"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="link-icon" style="background: #000">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                fill="#fff"
                d="M16.7 3c.5 1.9 1.9 3.3 3.8 3.6v2.7c-1.4.1-2.7-.3-3.8-1v6.4c0 3-2.4 5.3-5.3 5.3S6 17.7 6 14.7c0-2.9 2.2-5.2 5-5.3v2.7c-1.3.1-2.3 1.2-2.3 2.6 0 1.5 1.2 2.6 2.6 2.6s2.7-1.1 2.7-2.6V3h2.7z"
              />

          <span class="link-label" data-i18n="linkTiktok"
            >Hundred Plus TH Tiktok</span
          >
        </a>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script>
      (function () {
        var switcher = document.getElementById("langSwitcher");
        var btn = document.getElementById("langBtn");
        var btnLabel = document.getElementById("langBtnLabel");
        var menu = document.getElementById("langMenu");
        var options = menu.querySelectorAll(".lang-option");
        var labels = { en: "EN", tw: "TW", th: "TH" };

        function closeMenu() {
          switcher.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }

        function openMenu() {
          switcher.classList.add("open");
          btn.setAttribute("aria-expanded", "true");
        }

        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          if (switcher.classList.contains("open")) {
            closeMenu();
          } else {
            openMenu();
          }
        });

        document.addEventListener("click", function (e) {
          if (!switcher.contains(e.target)) closeMenu();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeMenu();
        });

        options.forEach(function (opt) {
          opt.addEventListener("click", function () {
            var lang = opt.getAttribute("data-lang");

            options.forEach(function (o) {
              o.setAttribute("aria-selected", "false");
            });
            opt.setAttribute("aria-selected", "true");
            btnLabel.textContent = labels[lang];

            // Swap /en/ path segments in link hrefs to match the chosen language
            document.querySelectorAll(".link-card[href]").forEach(function (a) {
              var href = a.getAttribute("href");
              var swapped = href.replace(/\/(en|tw|th)\//, "/" + lang + "/");
              a.setAttribute("href", swapped);
            });

            // Translate all tagged text/attributes on the page
            if (window.i18n) window.i18n.apply(lang);

            closeMenu();
            btn.focus();
          });
        });

        if (window.i18n) window.i18n.apply("en");
      })();
    </script>
  </body>
</html>
